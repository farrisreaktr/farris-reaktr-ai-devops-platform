trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  imageName: farris-reaktr-ai-app

steps:

- task: Docker@2
  inputs:
    containerRegistry: 'docker-hub-connection'
    repository: 'your-dockerhub-username/farris-reaktr-ai-app'
    command: 'buildAndPush'
    Dockerfile: '**/Dockerfile'
    tags: 'latest'
